name: Build Desktop Releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            script: npm run dist:win
            artifact_name: windows-dist
            artifact_path: |
              dist/*.exe
              dist/*.yml
              dist/*.blockmap
          - name: macOS
            os: macos-latest
            script: npm run dist:mac
            artifact_name: macos-dist
            artifact_path: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: ${{ matrix.platform.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: release-assets/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dist
          path: release-assets/macos

      - name: Ensure release exists
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release assets
        shell: bash
        run: |
          shopt -s nullglob
          files=(
            release-assets/windows/*.exe
            release-assets/windows/*.yml
            release-assets/windows/*.blockmap
            release-assets/macos/*.dmg
            release-assets/macos/*.zip
            release-assets/macos/*.blockmap
          )

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found to upload."
            exit 1
          fi

          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
